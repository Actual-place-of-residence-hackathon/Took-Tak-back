# 프론트엔드 EC2 (public subnet) nginx 설정
#
# 설치:
#   sudo cp deploy/nginx-frontend.conf /etc/nginx/conf.d/tooktak.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# ============================================================================
#  ⚠ 이 파일이 없으면 프론트에서 백엔드를 부를 수 없습니다.
#
#  백엔드는 private subnet 이라 퍼블릭 IP 가 없습니다.
#  프론트엔드가 SPA(React 등)라면 실제로 API 를 호출하는 주체는
#  "프론트엔드 EC2" 가 아니라 "사용자 브라우저" 입니다.
#  사용자 브라우저는 인터넷에 있으므로 백엔드의 사설 IP(10.0.x.x)에
#  절대 닿지 못합니다. 프론트 코드에 사설 IP 를 박으면 100% 실패합니다.
#
#  그래서 같은 VPC 안에 있는 프론트엔드 EC2 의 nginx 가 대신 받아
#  백엔드로 넘겨줍니다.  브라우저 → 프론트 EC2(공인) → 백엔드 EC2(사설)
#
#  프론트엔드는 API 주소를 상대경로 '/api' 로 두면 됩니다.
#  (예: axios.defaults.baseURL = '/api')
#  그러면 오리진이 같아져서 CORS 자체가 발생하지 않습니다.
#
#  ⚠⚠ 2026-07-24 수정: root/try_files 정적 서빙 방식이었던 이전 버전은
#  Next.js(App Router, `next start`, src/proxy.ts 미들웨어 사용)에 맞지 않습니다.
#  Next.js 는 CRA/Vite 같은 순수 정적 SPA 가 아니라, 요청마다 Node 서버가
#  렌더링해야 하는 앱입니다. 정적 파일로 서빙하면:
#    - "/" 는 우연히 남아있는 index.html 이 있으면 200
#    - 그 외 라우트는 파일이 없어 try_files 가 실패 → 404
#    - <Link> 클라이언트 사이드 이동은 브라우저에 이미 로드된 JS 가 처리해서
#      "가끔 되는 것처럼" 보이지만, 새로고침·직접 URL 진입·서버 데이터 페칭은
#      전부 깨집니다.
#  → 반드시 로컬 Node 프로세스(pm2 로 뜬 `next start`, 기본 3000 포트)로
#    proxy_pass 해야 합니다. 정적 파일 서빙이 아닙니다.
# ============================================================================

upstream tooktak_backend {
    # ↓↓↓ 백엔드 EC2 의 프라이빗 IP 로 바꾸세요 (CI/CD 기준 10.28.3.146) ↓↓↓
    server 10.28.3.146:4000;

    keepalive 32;
}

# pm2 로 뜬 Next.js(`next start`) 프로세스. 기본 3000번 포트.
# PORT 환경변수로 다른 포트를 쓰면 여기도 맞춰야 합니다.
upstream tooktak_frontend {
    server 127.0.0.1:3000;

    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 업로드 사진 3장까지 받으므로 기본값(1MB)보다 키웁니다.
    client_max_body_size 20M;

    # --- 1) Next.js 정적 에셋 (_next/static) ---
    # 파일명에 빌드 해시가 들어 있어 내용이 바뀌면 경로 자체가 바뀝니다.
    # 그래서 영구 캐싱해도 안전합니다. 없어도 동작엔 문제없지만 성능이 떨어집니다.
    location /_next/static/ {
        proxy_pass http://tooktak_frontend;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- 2) 나머지 전부 → Next.js Node 서버 ---
    # 페이지 라우팅, 서버 컴포넌트 렌더링, src/proxy.ts 미들웨어(관리자 가드)까지
    # 전부 이 프로세스가 처리해야 합니다. 정적 파일로 대체할 수 없습니다.
    location / {
        proxy_pass http://tooktak_frontend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 2-1) Next.js 자체 API 라우트(src/app/api/**) ---
    # /api/admin/login, /api/admin/logout 은 백엔드가 아니라 Next.js Route
    # Handler 입니다 (프론트 패스코드 쿠키 발급 + 백엔드 관리자 JWT 대리 발급).
    # 아래 (3)의 location /api/ 가 접두사만 보고 전부 백엔드로 넘겨버리면
    # 이 경로들도 같이 삼켜져서 백엔드가 404를 던집니다 — nginx는 접두사가
    # 더 긴(더 구체적인) location을 우선하므로, /api/ 보다 먼저 매치되도록
    # 반드시 여기 따로 선언해야 합니다. 새 Next.js API 라우트를 추가하면
    # (src/app/api/** 에 route.ts 를 새로 만들면) 이 목록에도 추가하세요.
    location /api/admin/ {
        proxy_pass http://tooktak_frontend;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 3) API 프록시 → 백엔드 EC2 (private subnet) ---
    location /api/ {
        proxy_pass http://tooktak_backend;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 분류가 신고 등록(POST /api/reports) 응답 경로 안에 있습니다.
        # 실측 6~9초, aiService 타임아웃이 25초이므로 그보다 넉넉히 잡습니다.
        # 기본값 60초로 두면 Bedrock 이 느릴 때 nginx 가 먼저 504 를 던집니다.
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # --- 4) 헬스체크 ---
    # 백엔드 자체 상태(DB 연결 포함)를 프론트에서 확인할 때 씁니다.
    location = /healthz {
        proxy_pass http://tooktak_backend/health;
        access_log off;
    }
}
